name: Release 4y-ui

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  mega-build:
    name: Build All Architectures
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Install Native Cross-Compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf gcc-arm-linux-gnueabi gcc-i686-linux-gnu gcc-s390x-linux-gnu gcc-mipsel-linux-gnu gcc-mips-linux-gnu mingw-w64 gcc-multilib zip

      - name: Download Shared Assets (GeoIP/Geosite)
        run: |
          mkdir -p shared_geo
          cd shared_geo
          # Download all files simultaneously to save time
          curl -sL -o geoip.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat &
          curl -sL -o geosite.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat &
          curl -sL -o geoip_IR.dat https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geoip.dat &
          curl -sL -o geosite_IR.dat https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geosite.dat &
          curl -sL -o geoip_RU.dat https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geoip.dat &
          curl -sL -o geosite_RU.dat https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geosite.dat &
          wait
          echo "Shared assets downloaded."

      - name: Compile and Package All
        run: |
          mkdir -p dist
          PLATFORMS="linux/amd64 linux/arm64 linux/armv7 linux/armv6 linux/armv5 linux/386 linux/s390x linux/mipsle linux/mips windows/amd64 windows/386"
          
          for PLAT in $PLATFORMS; do
            OS=${PLAT%/*}
            ARCH=${PLAT#*/}
            echo "========================================="
            echo "Building $OS/$ARCH"
            echo "========================================="
            
            # Reset variables for each loop
            export CGO_ENABLED=1
            export GOOS=$OS
            export GOARCH=$ARCH
            export GOARM=""
            export GOMIPS=""
            
            if[ "$OS" == "linux" ]; then
              if [ "$ARCH" == "amd64" ]; then export CC=gcc; XRAY_ARCH="64"
              elif [ "$ARCH" == "arm64" ]; then export CC=aarch64-linux-gnu-gcc; XRAY_ARCH="arm64-v8a"
              elif [ "$ARCH" == "armv7" ]; then export GOARCH=arm; export GOARM=7; export CC=arm-linux-gnueabihf-gcc; XRAY_ARCH="arm32-v7a"
              elif[ "$ARCH" == "armv6" ]; then export GOARCH=arm; export GOARM=6; export CC=arm-linux-gnueabi-gcc; XRAY_ARCH="arm32-v6"
              elif[ "$ARCH" == "armv5" ]; then export GOARCH=arm; export GOARM=5; export CC=arm-linux-gnueabi-gcc; XRAY_ARCH="arm32-v5"
              elif[ "$ARCH" == "386" ]; then export CC=i686-linux-gnu-gcc; XRAY_ARCH="32"
              elif [ "$ARCH" == "s390x" ]; then export CC=s390x-linux-gnu-gcc; XRAY_ARCH="s390x"
              elif [ "$ARCH" == "mipsle" ]; then export CC=mipsel-linux-gnu-gcc; export GOMIPS=softfloat; XRAY_ARCH="mips32le"
              elif [ "$ARCH" == "mips" ]; then export CC=mips-linux-gnu-gcc; export GOMIPS=softfloat; XRAY_ARCH="mips32"
              fi
              BIN_NAME="4y-ui"
              # Linux Static Compile
              go build -ldflags "-w -s -linkmode external -extldflags '-static'" -o "temp_build/4y-ui/$BIN_NAME" main.go
            elif [ "$OS" == "windows" ]; then
              if [ "$ARCH" == "amd64" ]; then export CC=x86_64-w64-mingw32-gcc; XRAY_ARCH="64"
              elif[ "$ARCH" == "386" ]; then export CC=i686-w64-mingw32-gcc; XRAY_ARCH="32"
              fi
              BIN_NAME="4y-ui.exe"
              # Windows Standard Compile
              go build -ldflags "-w -s" -o "temp_build/4y-ui/$BIN_NAME" main.go
            fi
            
            # Create folder structure
            mkdir -p temp_build/4y-ui/bin
            cp shared_geo/* temp_build/4y-ui/bin/
            
            # Download Xray Core
            XRAY_URL="https://github.com/XTLS/Xray-core/releases/download/v26.2.2/Xray-${OS}-${XRAY_ARCH}.zip"
            curl -sL -o xray.zip "$XRAY_URL"
            unzip -q xray.zip -d xray_temp && rm xray.zip
            
            # Package Archive
            if [ "$OS" == "linux" ]; then
              mv xray_temp/xray "temp_build/4y-ui/bin/xray-${OS}-${ARCH}"
              cp 4y-ui.service.* temp_build/4y-ui/ 2>/dev/null || true
              cp 4y-ui.sh temp_build/4y-ui/ 2>/dev/null || true
              cd temp_build
              tar -czvf "../dist/4y-ui-${OS}-${ARCH}.tar.gz" 4y-ui
              cd ..
            else
              mv xray_temp/xray.exe "temp_build/4y-ui/bin/xray-${OS}-${ARCH}.exe"
              cp -r windows_files/* temp_build/4y-ui/bin/ 2>/dev/null || true
              cd temp_build
              zip -r "../dist/4y-ui-${OS}-${ARCH}.zip" 4y-ui
              cd ..
            fi
            
            # Cleanup
            rm -rf temp_build xray_temp
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 4y-ui-all-releases
          path: dist/*

      - name: Upload to GH Release
        uses: svenstaro/upload-release-action@v2
        if: |
          (github.event_name == 'release' && github.event.action == 'published') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          file: dist/*
          file_glob: true
          overwrite: true
          prerelease: true