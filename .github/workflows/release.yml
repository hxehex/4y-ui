name: Release 4y-ui

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mega-build:
    name: Build All Architectures
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Install Native Cross-Compilers, UPX & Archivers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf gcc-arm-linux-gnueabi gcc-i686-linux-gnu gcc-s390x-linux-gnu gcc-mipsel-linux-gnu gcc-mips-linux-gnu mingw-w64 xz-utils p7zip-full upx-ucl zip

      - name: Download Shared Assets (GeoIP/Geosite)
        run: |
          mkdir -p shared_geo
          cd shared_geo
          curl -sL -o geoip.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat &
          curl -sL -o geosite.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat &
          curl -sL -o geoip_IR.dat https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geoip.dat &
          curl -sL -o geosite_IR.dat https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geosite.dat &
          curl -sL -o geoip_RU.dat https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geoip.dat &
          curl -sL -o geosite_RU.dat https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geosite.dat &
          wait

      - name: Compile and Package All Versions
        run: |
          mkdir -p dist
          PLATFORMS="linux/amd64 linux/arm64 linux/armv7 linux/armv6 linux/armv5 linux/386 linux/s390x linux/mipsle linux/mips windows/amd64 windows/386"
          
          for PLAT in $PLATFORMS; do
            OS=${PLAT%/*}
            ARCH=${PLAT#*/}
            echo "Building $OS/$ARCH (Standard and UPX versions)..."
            
            export CGO_ENABLED=1
            export GOOS=$OS
            export GOARCH=$ARCH
            export GOARM=""
            export GOMIPS=""
            
            if [ "$OS" = "linux" ]; then
              if [ "$ARCH" = "amd64" ]; then export CC=gcc; XRAY_ARCH="64"
              elif [ "$ARCH" = "arm64" ]; then export CC=aarch64-linux-gnu-gcc; XRAY_ARCH="arm64-v8a"
              elif [ "$ARCH" = "armv7" ]; then export GOARCH=arm; export GOARM=7; export CC=arm-linux-gnueabihf-gcc; XRAY_ARCH="arm32-v7a"
              elif [ "$ARCH" = "armv6" ]; then export GOARCH=arm; export GOARM=6; export CC=arm-linux-gnueabi-gcc; XRAY_ARCH="arm32-v6"
              elif [ "$ARCH" = "armv5" ]; then export GOARCH=arm; export GOARM=5; export CC=arm-linux-gnueabi-gcc; XRAY_ARCH="arm32-v5"
              elif [ "$ARCH" = "386" ]; then export CC=i686-linux-gnu-gcc; XRAY_ARCH="32"
              elif [ "$ARCH" = "s390x" ]; then export CC=s390x-linux-gnu-gcc; XRAY_ARCH="s390x"
              elif [ "$ARCH" = "mipsle" ]; then export CC=mipsel-linux-gnu-gcc; export GOMIPS=softfloat; XRAY_ARCH="mips32le"
              elif [ "$ARCH" = "mips" ]; then export CC=mips-linux-gnu-gcc; export GOMIPS=softfloat; XRAY_ARCH="mips32"
              fi
              BIN_NAME="4y-ui"
              go build -trimpath -tags "netgo,osusergo,sqlite_omit_load_extension" -ldflags "-w -s -buildid= -linkmode external -extldflags '-static'" -o "$BIN_NAME" main.go
            elif [ "$OS" = "windows" ]; then
              if [ "$ARCH" = "amd64" ]; then export CC=x86_64-w64-mingw32-gcc; XRAY_ARCH="64"
              elif [ "$ARCH" = "386" ]; then export CC=i686-w64-mingw32-gcc; XRAY_ARCH="32"
              fi
              BIN_NAME="4y-ui.exe"
              go build -trimpath -tags "netgo,osusergo,sqlite_omit_load_extension" -ldflags "-w -s -buildid=" -o "$BIN_NAME" main.go
            fi

            mkdir -p pack_upx/4y-ui/bin pack_noupx/4y-ui/bin
            cp "$BIN_NAME" pack_noupx/4y-ui/
            
            cp "$BIN_NAME" pack_upx/4y-ui/
            if [ "$ARCH" != "s390x" ] && [ "$ARCH" != "mips" ] && [ "$ARCH" != "mipsle" ]; then
                upx --ultra-brute --best --no-time --small --small "pack_upx/4y-ui/$BIN_NAME" || true
            fi
            
            if [ "$OS" = "windows" ]; then
              XRAY_URL="https://github.com/XTLS/Xray-core/releases/download/v26.2.2/Xray-windows-${XRAY_ARCH}.zip"
            else
              XRAY_URL="https://github.com/XTLS/Xray-core/releases/download/v26.2.2/Xray-linux-${XRAY_ARCH}.zip"
            fi
            curl -sL -o xray.zip "$XRAY_URL"
            unzip -q xray.zip -d xray_temp && rm xray.zip
            
            for TYPE in "upx" "noupx"; do
              TARGET_DIR="pack_${TYPE}/4y-ui"
              suffix=$([ "$TYPE" = "noupx" ] && echo "-no-upx" || echo "")
              
              if [ "$OS" = "linux" ]; then
                cp xray_temp/xray "${TARGET_DIR}/bin/xray-linux-${ARCH}"
                cp shared_geo/* "${TARGET_DIR}/bin/"
                cp 4y-ui.service.* 4y-ui.sh "${TARGET_DIR}/" 2>/dev/null || true
                
                cd pack_${TYPE}
                env XZ_OPT="-9e -T0" tar --owner=0 --group=0 --numeric-owner -cJf "../dist/4y-ui-linux-${ARCH}${suffix}.tar.xz" 4y-ui
                cd ..
              else
                cp xray_temp/xray.exe "${TARGET_DIR}/bin/xray-windows-${ARCH}.exe"
                cp shared_geo/* "${TARGET_DIR}/bin/"
                cp -r windows_files/* "${TARGET_DIR}/bin/" 2>/dev/null || true
                
                cd pack_${TYPE}
                7z a -t7z -m0=lzma2 -mx=9 -mfb=273 -md=64m -ms=on -mmt=on "../dist/4y-ui-windows-${ARCH}${suffix}.7z" 4y-ui
                cd ..
              fi
            done
            rm -rf pack_upx pack_noupx xray_temp "$BIN_NAME"
          done

      - name: Upload to GH Release
        uses: svenstaro/upload-release-action@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          file: dist/*
          file_glob: true
          overwrite: true